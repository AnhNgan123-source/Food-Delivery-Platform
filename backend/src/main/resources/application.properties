# 1. Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/food_delivery_platform_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Ép kiểu Dialect để tránh lỗi "Unable to determine Dialect"
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 3. Server config
server.port=8080

# 4. Upload file
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 5. Fix cho Hibernate 6+ (nếu cần)
spring.jpa.properties.hibernate.format_sql=true
# Ép Hibernate dùng chính xác tên bạn viết trong @Column(name="...")
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl