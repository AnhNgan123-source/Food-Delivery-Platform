spring.datasource.url=jdbc:mysql://localhost:3306/food_delivery_platform_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&useLegacyDatetimeCode=false
spring.datasource.username=root
spring.datasource.password=123456

# Cấu hình hibernate (tự động cập nhật bảng từ java entity)
spring.jpa.hibernate.ddl-auto=update
