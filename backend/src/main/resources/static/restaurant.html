<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Manager - Yummy Food</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="brand">
                <h3>Restaurant Hub</h3>
                <p id="res-name-display" style="font-size: 12px; color: #666;">Tên quán của bạn</p>
            </div>
            <ul>
                <li onclick="loadFragment('manage-menu')" class="active">Quản lý menu</li>
                <li onclick="loadFragment('toggle-items')">Bật/tắt món hết hàng</li>
                <li onclick="loadFragment('new-orders')">Nhận & xác nhận đơn mới</li>
                <li onclick="loadFragment('order-status')">Trạng thái đơn hàng</li>
                <li onclick="loadFragment('revenue-stats')">Xem thống kê doanh thu</li>
                <li onclick="loadFragment('res-info')">Quản lý thông tin nhà hàng</li>
            </ul>
            <button onclick="handleLogout()" class="btn-logout">Đăng xuất</button>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div id="fragment-title"><h2>Quản lý menu</h2></div>
                <div class="user-profile-mini">
                    <span id="user-display">Restaurant Admin</span>
                    <div class="avatar-mini">R</div>
                </div>
            </header>

            <div id="content-area">
                <div class="loader">Đang tải dữ liệu...</div>
            </div>
        </main>
    </div>

    <script src="js/dashboard.js"></script>
    <script>
        // Tự động load trang Quản lý menu khi vừa vào
        window.onload = () => {
            if (localStorage.getItem('role') !== 'RESTAURANT') {
                window.location.href = 'index.html';
            }
            loadFragment('manage-menu');
        }
    </script>
</body>
</html>
