<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Manager - Yummy Food</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <h3>Restaurant Hub</h3>
            <p class="sidebar-label">Tên quán của bạn</p>
            <ul>
                <li onclick="loadFragment('menu_management')" class="active">Quản lý menu</li>
                <li onclick="loadFragment('toggle_items')">Bật/tắt món hết hàng</li>
                <li onclick="loadFragment('orders')">Nhận & xác nhận đơn mới</li>
                <li onclick="loadFragment('order_status')">Trạng thái đơn hàng</li>
                <li onclick="loadFragment('revenue')">Xem thống kê doanh thu</li>
                <li onclick="loadFragment('restaurant_info')">Quản lý thông tin nhà hàng</li>
                
                <li onclick="loadFragment('profile')">Hồ sơ cá nhân</li>
            </ul>

            <button class="btn-logout" onclick="handleLogout()">Đăng xuất</button>
        </aside>

        <main class="main-content" id="main-content">
            <div class="header-flex">
                <h2 id="content-title">Quản lý menu</h2>
                <div class="user-brief">
                    <span id="display-username">Restaurant Admin</span>
                    <div class="mini-avatar">R</div>
                </div>
            </div>
            <hr>
            
            <div id="content-area">
                <p class="loader">Đang tải dữ liệu...</p>
            </div>
        </main>
    </div>

    <script src="js/profile.js"></script>
    <script src="js/dashboard.js"></script>
    
    <script>
        // Kiểm tra quyền truy cập ngay khi mở trang
        window.onload = () => {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');

            if (!token || role !== 'CUSTOMER') {
                alert("Bạn không có quyền truy cập!");
                window.location.href = 'index.html';
                return;
            }

            // Hiển thị tên admin lên góc phải
            document.getElementById('display-username').innerText = localStorage.getItem('username');
            
            // Mặc định load trang quản lý menu
            loadFragment('manage-menu');
        };

        function handleLogout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
