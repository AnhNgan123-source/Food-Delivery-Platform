<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yummy Food - Đặt món ngay!</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="customer-nav">
        <div class="nav-container">
            <div class="logo">Yummy Food</div>
            <div class="search-bar">
                <input type="text" placeholder="Tìm kiếm món ăn, nhà hàng...">
            </div>
            <div class="user-actions">
                <span id="p-fullname">Chào, Ngân!</span>
                <button onclick="handleLogout()" class="link-btn">Đăng xuất</button>
                <div class="cart-icon">🛒 <span id="cart-count">0</span></div>
            </div>
        </div>
    </nav>

    <div class="customer-layout">
        <header class="hero-section">
            <div class="hero-content">
                <h1>Giảm 50% cho đơn đầu tiên!</h1>
                <p>Hàng ngàn món ngon đang chờ bạn khám phá.</p>
                <button class="btn-order">Đặt ngay</button>
            </div>
        </header>

        <section class="category-section">
            <div class="cat-bar">
                <button class="cat-item active" onclick="filterCategory('all')">Tất cả</button>
                <button class="cat-item" onclick="filterCategory('rice')">Cơm</button>
                <button class="cat-item" onclick="filterCategory('noodle')">Món nước</button>
                <button class="cat-item" onclick="filterCategory('pizza')">Pizza</button>
                <button class="cat-item" onclick="filterCategory('drink')">Thức uống</button>
                <button class="cat-item" onclick="filterCategory('sushi')">Sushi</button>
            </div>
        </section>

        <main class="food-listing">
            <h2 class="section-title">Nhà hàng dành cho bạn</h2>
            <div class="grid-container" id="customer-main-grid">
                <div class="loader">Đang tìm quán ngon...</div>
            </div>
        </main>
    </div>

    <script src="js/customer.js"></script>
    <script>
        window.onload = () => {
            if (!localStorage.getItem('token')) window.location.href = 'index.html';
            document.getElementById('p-fullname').innerText = "Chào, " + localStorage.getItem('username');
            // Gọi hàm lấy danh sách nhà hàng thật từ API của Ngân
            fetchRestaurants(); 
        }
    </script>
</body>
</html>
